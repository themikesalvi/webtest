<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Notifications | XLNZ Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-primary: #0a0a0f; --bg-secondary: #12122a; --bg-card: #1a1a2e; --accent: #e94560; --accent-gradient: linear-gradient(135deg, #e94560, #ff6b35); --text-primary: #ffffff; --text-secondary: #b0b0c8; --text-muted: #7c7c92; --border: rgba(255,255,255,0.08); --success: #10b981; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-primary); color: var(--text-primary); margin: 0; line-height: 1.6; }
        .container { max-width: 960px; margin: 20px auto; padding: 20px; }
        .header { border-bottom: 2px solid var(--accent); padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { margin: 0; font-family: 'Montserrat', sans-serif; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .header-logout { float: right; background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border); padding: 8px 15px; border-radius: 4px; cursor: pointer; font-family: 'Inter', sans-serif; }
        .lead-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .lead-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; transition: transform 0.2s, box-shadow 0.2s; }
        .lead-card:hover { transform: translateY(-5px); box-shadow: var(--accent-gradient) 0 0 20px; }
        .lead-card h3 { margin-top: 0; color: var(--accent); font-family: 'Montserrat', sans-serif; font-weight: 600; }
        .meta { font-size: 0.9em; color: var(--text-muted); margin-bottom: 15px; }
        .status { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }
        .status.new { background-color: var(--success); color: white; }
        .no-leads { text-align: center; padding: 40px; color: var(--text-muted); }
        .btn { display: inline-block; background: var(--accent-gradient); color: white; padding: 12px 24px; border-radius: 4px; text-decoration: none; font-weight: 600; margin-top: 20px; transition: transform 0.2s; }
        .btn:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Lead Notification Center</h1>
            <button id="logoutBtn" class="header-logout">Logout</button>
        </div>

        <div id="leadContainer" class="lead-grid">
            <!-- Leads will be dynamically inserted here -->
            <div class="no-leads">No new leads yet. This dashboard will update when a contact form is submitted.</div>
        </div>
   </div>
    <script src="script.js"></script>
</body>
</html>
